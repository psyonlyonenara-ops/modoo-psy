<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모두의 상담사</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
  background: #fffaf5;
  color: #2f2925;
}

header {
  position: sticky;
  top: 0;
  background: #fffaf5;
  border-bottom: 1px solid #eee;
}

.nav {
  max-width: 1120px;
  margin: auto;
  padding: 16px;
  display: flex;
  justify-content: space-between;
}

.logo { font-weight: 900; }

.hero {
  max-width: 1120px;
  margin: auto;
  padding: 60px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.badge {
  background: #f4e4d8;
  padding: 6px 12px;
  border-radius: 999px;
  display: inline-block;
}

h1 { font-size: 42px; }

.search-box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.btn {
  background: #bc6538;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* 🔥 핵심 변경 부분 */
.hero-image {
  border-radius: 20px;
  overflow: hidden;
}

.hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">모두의 상담사</div>
  </div>
</header>

<main>

<section class="hero">
  <div>
    <span class="badge">검증된 임상·상담 심리 전문가</span>
    <h1>심리상담, 심리검사 받고 싶은데<br>누구한테 어떤 걸 받지?</h1>

    <div class="search-box">
      <input placeholder="검색" />
      <button class="btn">검색</button>
    </div>
  </div>

  <!-- 🔥 여기만 바뀐거 -->
  <div class="hero-image">
    <img src="images/hero-choice.png">
  </div>

</section>

</main>

</body>
</html>
